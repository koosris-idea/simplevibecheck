<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#e84300">
  <title>SimpleVibeCheck v3</title>
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #header {
      flex-shrink: 0;
      background-color: #e84300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
    }

    #header h1 {
      font-family: 'Fugaz One', sans-serif;
      font-style: italic;
      font-size: 2rem;
      color: white;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    #topDiv {
      flex: 2;
      background-color: #4caf50;
      transition: background-color 1.5s ease;
      cursor: pointer;
      user-select: none;
    }

    @keyframes pulse {
      0%   { filter: brightness(1.0); }
      50%  { filter: brightness(1.1); }
      100% { filter: brightness(0.9); }
    }

    #topDiv.listening {
      animation: pulse 2s ease-in-out infinite;
    }

    #bottomDiv {
      flex: 1;
      background-color: #4caf50;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      overflow: hidden;
    }

    .bar {
      flex-shrink: 0;
      width: calc(100vw / 20);
      height: 100%;
    }

    #warning {
      position: fixed;
      top: 50%;
      width: 100%;
      text-align: center;
      color: white;
      font-family: sans-serif;
      font-size: 1rem;
      pointer-events: none;
      padding: 0 16px;
    }

    #bottomnav {
      flex-shrink: 0;
      height: 58px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 8px;
    }
    #bottomnav a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 44px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    #bottomnav a.active { color: #FFC148; }
    #bottomnav svg { width: 26px; height: 26px; fill: currentColor; }
  </style>
</head>
<body>
  <div id="header"><h1>VibeCheck</h1></div>
  <div id="topDiv"></div>
  <div id="bottomDiv"></div>
  <div id="warning"></div>

  <nav id="bottomnav" onclick="event.stopPropagation()">
    <a href="index.html" title="Home">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>
    <a href="overzicht.html" title="Overzicht">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
    </a>
    <a href="spreekbuis.html" title="Spreekbuis">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </a>
    <a href="v3.html" title="VibeCheck" class="active">
      <svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
    </a>
  </nav>

  <script>
    var COLORS = {
      '-3': '#444444',
      '-2': '#888888',
      '-1': '#c8c8c8',
       '0': '#4caf50',
       '1': '#ff8a80',
       '2': '#e53935',
       '3': '#8b0000'
    };

    var RED_WORDS = [
      'fascist', 'fascisten', 'hufter', 'hufters',
      'gek', 'idioot', 'idioten', 'leugenaar', 'leugenaars',
      'racist', 'racisten', 'opruier', 'opruiers'
    ];
    var GREY_WORDS = [
      'saai', 'zinloos', 'gedoe', 'onzin',
      'maakt niet uit', 'boeit me niet'
    ];

    var INTERVAL = 3000; // herberekening elke 3s
    var MAX_BARS          = 20;

    var listening           = false;
    var recognition         = null;
    var intervalId          = null;
    var intervalTranscripts = [];
    var baseScore           = 0;

    var topDiv    = document.getElementById('topDiv');
    var bottomDiv = document.getElementById('bottomDiv');
    var warning   = document.getElementById('warning');

    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      warning.textContent = 'Web Speech API niet ondersteund. Gebruik Chrome of Vivaldi.';
    }

    document.addEventListener('click', function() {
      if (!listening) startListening();
      else stopListening();
    });

    function startListening() {
      listening           = true;
      intervalTranscripts = [];
      baseScore           = 0;
      warning.textContent = '';
      bottomDiv.innerHTML = '';
      topDiv.style.backgroundColor = COLORS['0'];
      topDiv.classList.add('listening');

      if (!SR) {
        warning.textContent = 'Web Speech API niet ondersteund. Gebruik Chrome of Vivaldi.';
        return;
      }

      recognition = new SR();
      recognition.lang           = 'nl-NL';
      recognition.continuous     = true;
      recognition.interimResults = true;

      recognition.onresult = function(event) {
        for (var i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            var text = event.results[i][0].transcript.toLowerCase();
            intervalTranscripts.push(text);
          }
        }
      };

      recognition.onerror = function(e) {
        if (e.error !== 'no-speech') warning.textContent = 'Fout: ' + e.error;
      };

      recognition.onend = function() {
        if (listening) recognition.start();
      };

      recognition.start();
      intervalId = setInterval(recalculate, INTERVAL);
    }

    function stopListening() {
      listening = false;
      topDiv.classList.remove('listening');
      if (recognition) { recognition.stop(); recognition = null; }
      if (intervalId)  { clearInterval(intervalId); intervalId = null; }
      topDiv.style.backgroundColor = COLORS['0'];
    }

    function recalculate() {
      // --- Woordscore van dit interval ---
      var intervalText = intervalTranscripts.join(' ');
      intervalTranscripts = []; // reset voor volgend interval

      var redCount  = 0;
      var greyCount = 0;
      RED_WORDS.forEach(function(w)  { if (intervalText.indexOf(w) !== -1) redCount++;  });
      GREY_WORDS.forEach(function(w) { if (intervalText.indexOf(w) !== -1) greyCount++; });

      var hasKeywords = redCount > 0 || greyCount > 0;

      if (hasKeywords) {
        // Netto delta toepassen op persistente score
        baseScore += (redCount - greyCount);
      } else {
        // Decay richting 0
        if (baseScore > 0) baseScore--;
        else if (baseScore < 0) baseScore++;
      }

      baseScore = Math.max(-3, Math.min(3, baseScore));
      topDiv.style.backgroundColor = COLORS[String(baseScore)];
      addBar(baseScore);
    }

    function addBar(score) {
      var bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.backgroundColor = COLORS[String(score)];
      bottomDiv.insertBefore(bar, bottomDiv.firstChild);
      if (bottomDiv.children.length > MAX_BARS) {
        bottomDiv.removeChild(bottomDiv.lastChild);
      }
    }
  </script>
</body>
</html>
