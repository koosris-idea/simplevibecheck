<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#e84300">
  <title>Spreekbuis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      flex-shrink: 0;
      background-color: #e84300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
    }

    #header h1 {
      font-family: 'Fugaz One', sans-serif;
      font-style: italic;
      font-size: 2rem;
      color: white;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    /* Drie gelijke secties */
    #section-cloud,
    #section-vibe,
    #section-ai {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* Sectie 1: Woordwolk */
    #section-cloud {
      background-color: #FFC148;
      display: flex;
      flex-wrap: wrap;
      align-content: center;
      justify-content: center;
      align-items: center;
      gap: 8px 16px;
      padding: 16px;
      cursor: pointer;
      user-select: none;
    }

    .word {
      color: black;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      display: inline-block;
      transition: font-size 0.6s ease;
      line-height: 1.1;
    }

    @keyframes wordPulse {
      0%   { transform: scale(1);   }
      50%  { transform: scale(1.5); }
      100% { transform: scale(1);   }
    }

    .word.pulsing {
      animation: wordPulse 0.35s ease-in-out 3;
    }

    /* Sectie 2: VibeCheck */
    #section-vibe {
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }

    #vibe-main {
      flex: 2;
      background-color: #4caf50;
      transition: background-color 1.5s ease;
    }

    @keyframes pulse {
      0%   { filter: brightness(1.0); }
      50%  { filter: brightness(1.1); }
      100% { filter: brightness(0.9); }
    }

    #vibe-main.listening {
      animation: pulse 2s ease-in-out infinite;
    }

    #vibe-bars {
      flex: 1;
      background-color: #4caf50;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      overflow: hidden;
    }

    .bar {
      flex-shrink: 0;
      width: calc(100vw / 20);
      height: 100%;
    }

    /* Sectie 3: AI inzichten */
    #section-ai {
      background: #ffffff;
      border-top: 2px solid #e84300;
      padding: 8px 10px;
      overflow-y: auto;
    }

    #ai-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px;
    }

    #ai-title {
      color: #e84300;
      font-family: 'Nunito', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #ai-updated {
      color: #aaa;
      font-family: 'Nunito', sans-serif;
      font-size: 0.55rem;
    }

    #ai-columns {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }

    .ai-col-title {
      color: #e84300;
      font-family: 'Nunito', sans-serif;
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .ai-item {
      background: #f5f5f5;
      border-radius: 4px;
      padding: 5px;
      margin-bottom: 3px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.65rem;
      color: #111;
      line-height: 1.3;
    }

    #warning {
      position: fixed;
      top: 50%;
      width: 100%;
      text-align: center;
      color: black;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      pointer-events: none;
      padding: 0 16px;
    }

    #bottomnav {
      flex-shrink: 0;
      height: 58px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 8px;
    }
    #bottomnav a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 44px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    #bottomnav a.active { color: #FFC148; }
    #bottomnav svg { width: 26px; height: 26px; fill: currentColor; }
  </style>
</head>
<body>

  <div id="header"><h1>Spreekbuis</h1></div>

  <!-- Sectie 1: Woordwolk -->
  <div id="section-cloud"></div>

  <!-- Sectie 2: VibeCheck -->
  <div id="section-vibe">
    <div id="vibe-main"></div>
    <div id="vibe-bars"></div>
  </div>

  <!-- Sectie 3: AI inzichten -->
  <div id="section-ai">
    <div id="ai-header">
      <span id="ai-title">AI Inzichten</span>
      <span id="ai-updated"></span>
    </div>
    <div id="ai-columns">
      <div>
        <div class="ai-col-title">✅ Actiepunten</div>
        <div id="col-actiepunten"></div>
      </div>
      <div>
        <div class="ai-col-title">💬 Wensen</div>
        <div id="col-wensen"></div>
      </div>
      <div>
        <div class="ai-col-title">💡 Oplossingen</div>
        <div id="col-oplossingen"></div>
      </div>
    </div>
  </div>

  <div id="warning"></div>

  <nav id="bottomnav" onclick="event.stopPropagation()">
    <a href="index.html" title="Home">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>
    <a href="overzicht.html" title="Overzicht">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
    </a>
    <a href="spreekbuis.html" title="Spreekbuis" class="active">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </a>
    <a href="v3.html" title="VibeCheck">
      <svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
    </a>
  </nav>

  <script>
    // ── Stopwords ────────────────────────────────────────────────────────────
    var STOPWORDS = [
      'aan','af','al','als','ben','bij','dat','de','die','dit','door','dus',
      'een','en','er','even','geen','gewoon','haar','had','heb','heeft','hem',
      'hen','het','hier','hoe','hun','ik','in','is','ja','je','jij','jullie',
      'kan','maar','me','mee','met','mij','mijn','nee','niet','nog','nu','of',
      'om','ons','ook','op','over','se','toch','te','tot','uit','van','via',
      'voor','want','was','wat','we','wel','werd','wie','wij','worden','wordt',
      'ze','zich','zij','zijn','zo','zou','zelf','dan','naar','per','iets',
      'alles','echt','heel','daar','u','uw','hebben'
    ];

    // ── VibeCheck config ─────────────────────────────────────────────────────
    var COLORS = {
      '-3': '#444444', '-2': '#888888', '-1': '#c8c8c8',
       '0': '#4caf50',
       '1': '#ff8a80',  '2': '#e53935',  '3': '#8b0000'
    };
    var RED_WORDS  = ['fascist','fascisten','hufter','hufters','gek','idioot',
                      'idioten','leugenaar','leugenaars','racist','racisten',
                      'opruier','opruiers'];
    var GREY_WORDS = ['saai','zinloos','gedoe','onzin','maakt niet uit','boeit me niet'];
    var VIBE_INTERVAL = 3000;
    var MAX_BARS      = 20;

    // ── Woordwolk config ─────────────────────────────────────────────────────
    var MAX_WORDS = 15;
    var MIN_SIZE  = 13;
    var MAX_SIZE  = 48;

    // ── State ────────────────────────────────────────────────────────────────
    var listening           = false;
    var recognition         = null;

    // Woordwolk
    var wordCounts          = {};
    var wordOrder           = [];

    // VibeCheck
    var vibeIntervalId      = null;
    var intervalTranscripts = [];
    var baseScore           = 0;
    var interimProcessed    = false;

    // AI
    var fullTranscript      = '';
    var lastAnalyzedLength  = 0;
    var insights            = { actiepunten: [], wensen: [], oplossingen: [] };
    var aiIntervalId        = null;
    var lastUpdated         = null;
    var updatedTimerId      = null;

    // ── DOM refs ─────────────────────────────────────────────────────────────
    var cloud    = document.getElementById('section-cloud');
    var vibeMain = document.getElementById('vibe-main');
    var vibeBars = document.getElementById('vibe-bars');
    var warning  = document.getElementById('warning');

    // ── Speech Recognition ───────────────────────────────────────────────────
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) warning.textContent = 'Web Speech API niet ondersteund. Gebruik Chrome of Vivaldi.';

    document.addEventListener('click', function() {
      if (!listening) startListening();
      else stopListening();
    });

    function startListening() {
      listening           = true;
      fullTranscript      = '';
      lastAnalyzedLength  = 0;
      lastUpdated         = null;
      insights            = { actiepunten: [], wensen: [], oplossingen: [] };
      intervalTranscripts = [];
      baseScore           = 0;
      interimProcessed    = false;
      warning.textContent = '';
      vibeBars.innerHTML  = '';
      vibeMain.style.backgroundColor = COLORS['0'];
      vibeMain.classList.add('listening');

      if (!SR) { warning.textContent = 'Web Speech API niet ondersteund.'; return; }

      recognition = new SR();
      recognition.lang           = 'nl-NL';
      recognition.continuous     = true;
      recognition.interimResults = true;

      recognition.onresult = function(event) {
        for (var i = event.resultIndex; i < event.results.length; i++) {
          var text = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            // Woordwolk + AI transcript
            processText(text);
            // VibeCheck
            if (!interimProcessed) intervalTranscripts.push(text.toLowerCase());
            interimProcessed = false;
          } else {
            // VibeCheck: interim direct reageren op sleutelwoorden
            if (!interimProcessed) {
              var tl = text.toLowerCase();
              var rc = 0, gc = 0;
              RED_WORDS.forEach(function(w)  { if (tl.indexOf(w) !== -1) rc++; });
              GREY_WORDS.forEach(function(w) { if (tl.indexOf(w) !== -1) gc++; });
              if (rc > 0 || gc > 0) {
                interimProcessed = true;
                baseScore += (rc - gc);
                baseScore = Math.max(-3, Math.min(3, baseScore));
                vibeMain.style.backgroundColor = COLORS[String(baseScore)];
                addBar(baseScore);
                clearInterval(vibeIntervalId);
                vibeIntervalId = setInterval(recalculate, VIBE_INTERVAL);
              }
            }
          }
        }
      };

      recognition.onerror = function(e) {
        if (e.error !== 'no-speech') warning.textContent = 'Fout: ' + e.error;
      };

      recognition.onend = function() {
        if (listening) recognition.start();
      };

      recognition.start();
      vibeIntervalId = setInterval(recalculate, VIBE_INTERVAL);
      aiIntervalId   = setInterval(analyzeTranscript, 30000);
      startUpdatedTimer();
    }

    function stopListening() {
      listening = false;
      vibeMain.classList.remove('listening');
      if (recognition)    { recognition.stop(); recognition = null; }
      if (vibeIntervalId) { clearInterval(vibeIntervalId); vibeIntervalId = null; }
      if (aiIntervalId)   { clearInterval(aiIntervalId);   aiIntervalId   = null; }
      if (updatedTimerId) { clearInterval(updatedTimerId); updatedTimerId = null; }
      vibeMain.style.backgroundColor = COLORS['0'];
    }

    // ── VibeCheck ────────────────────────────────────────────────────────────
    function recalculate() {
      var intervalText = intervalTranscripts.join(' ');
      intervalTranscripts = [];
      var redCount = 0, greyCount = 0;
      RED_WORDS.forEach(function(w)  { if (intervalText.indexOf(w) !== -1) redCount++;  });
      GREY_WORDS.forEach(function(w) { if (intervalText.indexOf(w) !== -1) greyCount++; });
      if (redCount > 0 || greyCount > 0) {
        baseScore += (redCount - greyCount);
      } else {
        if (baseScore > 0) baseScore--;
        else if (baseScore < 0) baseScore++;
      }
      baseScore = Math.max(-3, Math.min(3, baseScore));
      vibeMain.style.backgroundColor = COLORS[String(baseScore)];
      addBar(baseScore);
    }

    function addBar(score) {
      var bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.backgroundColor = COLORS[String(score)];
      vibeBars.insertBefore(bar, vibeBars.firstChild);
      if (vibeBars.children.length > MAX_BARS) vibeBars.removeChild(vibeBars.lastChild);
    }

    // ── Woordwolk ────────────────────────────────────────────────────────────
    function processText(text) {
      fullTranscript += ' ' + text;
      var words = text.toLowerCase()
        .replace(/[^a-záéíóúàèìòùäëïöü\s]/g, '')
        .split(/\s+/)
        .filter(function(w) { return w.length >= 3 && STOPWORDS.indexOf(w) === -1; });
      words.forEach(function(word) { if (word) addWord(word); });
    }

    function addWord(word) {
      var isNew = !wordCounts[word];
      if (isNew) { wordOrder.push(word); wordCounts[word] = 0; }
      wordCounts[word]++;
      if (Object.keys(wordCounts).length > MAX_WORDS) {
        var victim = wordOrder[0];
        for (var i = 0; i < wordOrder.length; i++) {
          var w = wordOrder[i];
          if (w !== word && wordCounts[w] <= wordCounts[victim]) victim = w;
        }
        delete wordCounts[victim];
        wordOrder.splice(wordOrder.indexOf(victim), 1);
        var el = document.querySelector('[data-word="' + victim + '"]');
        if (el) cloud.removeChild(el);
      }
      renderWord(word, isNew);
    }

    function renderWord(pulseWord) {
      var counts   = Object.keys(wordCounts).map(function(w) { return wordCounts[w]; });
      var minC     = Math.min.apply(null, counts);
      var maxC     = Math.max.apply(null, counts);
      var el = document.querySelector('[data-word="' + pulseWord + '"]');
      if (!el) {
        el = document.createElement('span');
        el.className = 'word';
        el.setAttribute('data-word', pulseWord);
        el.textContent = pulseWord;
        cloud.appendChild(el);
      }
      var count    = wordCounts[pulseWord];
      var fontSize = minC === maxC ? (MIN_SIZE + MAX_SIZE) / 2
                                   : MIN_SIZE + (count - minC) / (maxC - minC) * (MAX_SIZE - MIN_SIZE);
      el.style.fontSize = Math.round(fontSize) + 'px';
      Object.keys(wordCounts).forEach(function(w) {
        if (w === pulseWord) return;
        var wEl = document.querySelector('[data-word="' + w + '"]');
        if (!wEl) return;
        var wSize = minC === maxC ? (MIN_SIZE + MAX_SIZE) / 2
                                  : MIN_SIZE + (wordCounts[w] - minC) / (maxC - minC) * (MAX_SIZE - MIN_SIZE);
        wEl.style.fontSize = Math.round(wSize) + 'px';
      });
      el.classList.remove('pulsing');
      void el.offsetWidth;
      el.classList.add('pulsing');
      el.addEventListener('animationend', function() { el.classList.remove('pulsing'); }, { once: true });
    }

    // ── AI inzichten ─────────────────────────────────────────────────────────
    function analyzeTranscript() {
      var text = fullTranscript.trim();
      if (text.length < 30 || text.length === lastAnalyzedLength) return;
      lastAnalyzedLength = text.length;
      var prompt = 'Je analyseert een transcriptie van een buurtgesprek.\n\n'
        + 'Huidig transcript:\n' + text + '\n\n'
        + 'Bestaande inzichten (voorkom duplicaten):\n' + JSON.stringify(insights) + '\n\n'
        + 'Geef een VOLLEDIGE bijgewerkte JSON terug met alle inzichten (oud + nieuw, duplicaten samengevoegd):\n'
        + '{"actiepunten":["..."],"wensen":["..."],"oplossingen":["..."]}\n\n'
        + 'Regels:\n'
        + '- Alleen wat écht gezegd is in het transcript\n'
        + '- Maximaal 8 items per categorie\n'
        + '- Nederlands, beknopt (max 6 woorden per item)\n'
        + '- Geen duplicaten of herformuleringen van hetzelfde punt\n'
        + '- Geef alleen de JSON terug, geen uitleg';
      fetch('https://spreekbuis-proxy.koos-4a1.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 512,
          messages: [{ role: 'user', content: prompt }]
        })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var responseText = data.content && data.content[0] && data.content[0].text;
        if (!responseText) return;
        var match = responseText.match(/\{[\s\S]*\}/);
        if (!match) return;
        var parsed = JSON.parse(match[0]);
        if (Array.isArray(parsed.actiepunten)) insights.actiepunten = parsed.actiepunten;
        if (Array.isArray(parsed.wensen))      insights.wensen      = parsed.wensen;
        if (Array.isArray(parsed.oplossingen)) insights.oplossingen = parsed.oplossingen;
        lastUpdated = Date.now();
        renderInsights();
      })
      .catch(function(err) {
        warning.textContent = 'AI fout: ' + err;
        setTimeout(function() { warning.textContent = ''; }, 5000);
      });
    }

    function renderInsights() {
      renderCol(document.getElementById('col-actiepunten'), insights.actiepunten);
      renderCol(document.getElementById('col-wensen'),      insights.wensen);
      renderCol(document.getElementById('col-oplossingen'), insights.oplossingen);
    }

    function renderCol(el, items) {
      if (!el) return;
      el.innerHTML = '';
      items.forEach(function(item) {
        var div = document.createElement('div');
        div.className = 'ai-item';
        div.textContent = item;
        el.appendChild(div);
      });
    }

    function startUpdatedTimer() {
      updatedTimerId = setInterval(function() {
        var el = document.getElementById('ai-updated');
        if (!el) return;
        if (lastUpdated === null) { el.textContent = ''; return; }
        var secs = Math.round((Date.now() - lastUpdated) / 1000);
        el.textContent = 'bijgewerkt ' + secs + 's geleden';
      }, 1000);
    }
  </script>
</body>
</html>
