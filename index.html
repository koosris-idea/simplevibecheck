<html lang="nl">
<head>
  <meta charset="UTF-8">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    a.tile {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    a.tile h1 {
      font-family: 'Fugaz One', sans-serif;
      font-style: italic;
      font-size: 2.8rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    #tile-overzicht  { background-color: #FFC148; }
    #tile-spreekbuis { background-color: #FC4700; }
    #tile-vibecheck  { background-color: #4caf50; }
  </style>
</head>
<body>
  <a class="tile" id="tile-overzicht"  href="overzicht.html"><h1>Overzicht</h1></a>
  <a class="tile" id="tile-spreekbuis" href="spreekbuis.html"><h1>Spreekbuis</h1></a>
